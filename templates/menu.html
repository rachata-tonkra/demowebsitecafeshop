<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafe Shop Menu</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f7f3ef;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #5c4033;
        }

        .top-bar {
            text-align: center;
            margin-bottom: 20px;
        }

        .top-bar a {
            text-decoration: none;
            background-color: #6f4e37;
            color: white;
            padding: 10px 16px;
            border-radius: 6px;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
            gap: 20px;
        }

        .card {
            background-color: white;
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            text-align: center;
        }

        .card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 8px;
        }

        .price {
            color: #b85c38;
            font-weight: bold;
        }

        .stock {
            color: #444;
        }

        .category {
            color: #666;
            font-size: 14px;
        }

        .actions a {
            display: inline-block;
            margin: 6px 4px;
            padding: 8px 12px;
            text-decoration: none;
            border-radius: 5px;
            color: white;
        }

        .edit-btn {
            background-color: #3498db;
        }

        .delete-btn {
            background-color: #e74c3c;
        }
    </style>
</head>
<body>
    <h1>Cafe Shop Menu</h1>

    <div class="top-bar">
        <a href="{{ url_for('add_item') }}">+ Add Product</a>
    </div>

    <div class="container">
        {% for item in items %}
        <div class="card">
            <img src="{{ item['image'] }}" alt="{{ item['name'] }}">
            <h3>{{ item['name'] }}</h3>
            <p class="category">Category: {{ item['category_name'] }}</p>
            <p class="price">Price: {{ item['price'] }} Baht</p>
            <p class="stock">Stock: {{ item['stock'] }}</p>

            <div class="actions">
                <a class="edit-btn" href="{{ url_for('edit_item', id=item['id']) }}">Edit</a>
                <a class="delete-btn" href="{{ url_for('delete_item', id=item['id']) }}"
                   onclick="return confirm('Are you sure you want to delete this item?')">
                   Delete
                </a>
            </div>
        </div>
        {% endfor %}
    </div>
</body>
</html>
